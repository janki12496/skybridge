name: SkyBridge CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend with Maven
        run: |
          cd skybridge-backend
          mvn clean install -DskipTests

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd skybridge-frontend
          npm install

      - name: Build Frontend
        run: |
          cd skybridge-frontend
          npm run build

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v3

      - name: Build Backend Docker Image
        run: docker build -t skybridge-backend ./skybridge-backend

      - name: Build Frontend Docker Image
        run: docker build -t skybridge-frontend ./skybridge-frontend