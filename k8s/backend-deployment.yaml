apiVersion: apps/v1
kind: Deployment
metadata:
  name: skybridge-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skybridge-backend
  template:
    metadata:
      labels:
        app: skybridge-backend
    spec:
      containers:
        - name: skybridge-backend
          image: skybridge-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"